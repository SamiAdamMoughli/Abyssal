# =============================================================================
# Railway service: vesselx-brain-api
# Role: Ops-facing API — task inspection, rule management, manual triggers.
# Exposed: internal only (restrict via Railway private networking)
# =============================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = """
  uvicorn vesselx.brain.app:app \
    --host 0.0.0.0 \
    --port $PORT \
    --log-level info
"""
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[deploy.envVars]
PYTHONPATH = "/app/src:/app"
PYTHONUNBUFFERED = "1"
