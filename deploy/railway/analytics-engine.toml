# =============================================================================
# Railway service: vesselx-analytics-engine
# Role: Private analytics API — risk scoring, vessel history aggregation.
# Exposed: internal only (no public route)
# =============================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = """
  uvicorn vesselx.analytics_engine.app:app \
    --host 0.0.0.0 \
    --port $PORT \
    --workers 2 \
    --loop uvloop \
    --http httptools \
    --log-level info
"""
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[deploy.envVars]
PYTHONPATH = "/app/src:/app"
PYTHONUNBUFFERED = "1"
