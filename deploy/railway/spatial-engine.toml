# =============================================================================
# Railway service: vesselx-spatial-engine
# Role: Public-facing API — PostGIS spatial queries, vessel lookups, H3 grid.
# Exposed: yes ($PORT)
# =============================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
preDeployCommand = "alembic upgrade head"
startCommand = """
  uvicorn vesselx.spatial_engine.app:app \
    --host 0.0.0.0 \
    --port $PORT \
    --workers 4 \
    --loop uvloop \
    --http httptools \
    --log-level info
"""
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[deploy.envVars]
PYTHONPATH = "/app/src:/app"
PYTHONUNBUFFERED = "1"
