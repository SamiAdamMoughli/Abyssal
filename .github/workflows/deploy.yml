name: Deploy

on:
  push:
    branches: ["main"]

# Only one deploy runs at a time; new push cancels in-flight deploy.
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Backend — Railway (all services share the same image)
  # ---------------------------------------------------------------------------
  deploy-railway:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy spatial-engine
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service vesselx-spatial-engine \
            --detach

      - name: Deploy analytics-engine
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service vesselx-analytics-engine \
            --detach

      - name: Deploy brain (Celery worker)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service vesselx-brain \
            --detach

      - name: Deploy sync-worker (Celery beat)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service vesselx-sync-worker \
            --detach

      - name: Deploy spatial-worker
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service vesselx-spatial-worker \
            --detach

  # ---------------------------------------------------------------------------
  # Frontend — Vercel
  # ---------------------------------------------------------------------------
  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: frontend-vite

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-vite/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx vercel deploy --prod \
            --token "$VERCEL_TOKEN" \
            --yes
