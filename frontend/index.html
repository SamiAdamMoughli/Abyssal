<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mission Radar</title>

  <!-- Leaflet (CDN, kein Build-Step) -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <style>
    :root {
      --bg: #0b1220;
      --panel: #111c2e;
      --panel-2: #16243a;
      --text: #e6edf6;
      --muted: #8aa0bd;
      --red: #ff4d4f;
      --yellow: #f5c451;
      --green: #4caf7d;
      --accent: #2d8cff;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Seitenleiste */
    #sidebar {
      width: 380px;
      min-width: 320px;
      background: var(--panel);
      border-right: 1px solid #1f2f48;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    #sidebar header {
      padding: 18px 18px 12px;
      border-bottom: 1px solid #1f2f48;
    }
    #sidebar header h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0.5px;
    }
    #sidebar header p {
      margin: 4px 0 0;
      font-size: 12px;
      color: var(--muted);
    }
    #status {
      padding: 8px 18px;
      font-size: 12px;
      color: var(--muted);
    }
    #status.error {
      color: var(--red);
      background: #2a1115;
      border-bottom: 1px solid #4a1d22;
      line-height: 1.5;
    }
    #targets {
      overflow-y: auto;
      padding: 8px 12px 24px;
      flex: 1;
    }

    /* Target-Card */
    .card {
      background: var(--panel-2);
      border: 1px solid #243650;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.05s;
    }
    .card:hover { border-color: var(--accent); }
    .card:active { transform: scale(0.995); }
    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .card-name { font-weight: 600; font-size: 15px; }
    .card-flag { font-size: 11px; color: var(--muted); font-weight: 400; }
    .badge-score {
      font-weight: 700;
      font-size: 14px;
      padding: 3px 10px;
      border-radius: 999px;
      color: #06121f;
      min-width: 42px;
      text-align: center;
    }
    .card-reason {
      margin: 8px 0 0;
      font-size: 12.5px;
      color: var(--muted);
      line-height: 1.4;
    }
    .rule-badges {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .rule-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 6px;
      background: #1d2c44;
      border: 1px solid #2c4264;
      color: var(--text);
      white-space: nowrap;
    }
    .rule-badge b { color: var(--yellow); font-weight: 700; }

    /* Karte */
    #map { flex: 1; height: 100%; background: #0b1220; }

    /* Leaflet-Popup im Dark-Theme */
    .leaflet-popup-content-wrapper, .leaflet-popup-tip {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid #2c4264;
    }
    .leaflet-popup-content { margin: 12px 14px; font-size: 13px; line-height: 1.45; }
    .leaflet-popup-content h3 { margin: 0 0 6px; font-size: 15px; }
    .popup-score { font-weight: 700; }
    .popup-reasons { margin: 8px 0 0; padding-left: 18px; }
    .popup-reasons li { margin-bottom: 6px; }
    .popup-reasons .lbl { color: var(--yellow); font-weight: 600; }
    a.leaflet-popup-close-button { color: var(--muted) !important; }
  </style>
</head>
<body>
  <div id="sidebar">
    <header>
      <h1>🛰️ Mission Radar</h1>
      <p>Priorisierte Ziele bei der Bekaempfung illegaler Fischerei</p>
    </header>
    <div id="status">Lade Daten…</div>
    <div id="targets"></div>
  </div>
  <div id="map"></div>

  <script>
    // ----------------------------------------------------------------- //
    // Konfiguration
    // ----------------------------------------------------------------- //
    const API_BASE = "http://localhost:8000";

    // ----------------------------------------------------------------- //
    // Karte
    // ----------------------------------------------------------------- //
    const map = L.map("map", { zoomControl: true }).setView([-0.5, -90.5], 9);
    L.tileLayer(
      "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
      {
        attribution:
          '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; ' +
          '<a href="https://carto.com/attributions">CARTO</a>',
        maxZoom: 19,
      }
    ).addTo(map);

    // mmsi -> { marker, latlng } fuer Klick-aus-Sidebar
    const markersByMmsi = {};

    function colorFor(score) {
      if (score >= 60) return "#ff4d4f"; // rot
      if (score >= 30) return "#f5c451"; // gelb
      return "#4caf7d";                  // gruen
    }
    function radiusFor(score) {
      // 8px Basis + bis zu 22px nach Score
      return 8 + (Math.min(score, 100) / 100) * 22;
    }

    function popupHtml(v) {
      const reasons = (v.reasons || [])
        .map(
          (r) =>
            `<li><span class="lbl">${r.label} (+${r.points})</span><br>${r.detail}</li>`
        )
        .join("");
      return `
        <h3>${v.name}</h3>
        <div class="popup-score" style="color:${colorFor(v.score)}">
          Score ${Math.round(v.score)} / 100
        </div>
        <div style="color:var(--muted);font-size:12px;margin-top:2px">
          MMSI ${v.mmsi} &middot; Flagge ${v.flag} &middot; ${v.speed_knots.toFixed(1)} kn
        </div>
        ${
          reasons
            ? `<ul class="popup-reasons">${reasons}</ul>`
            : `<p style="color:var(--muted)">Keine Risiko-Begruendung.</p>`
        }
      `;
    }

    function renderMarkers(vessels) {
      vessels.forEach((v) => {
        const marker = L.circleMarker([v.lat, v.lon], {
          radius: radiusFor(v.score),
          color: colorFor(v.score),
          fillColor: colorFor(v.score),
          fillOpacity: 0.55,
          weight: 2,
        }).addTo(map);
        marker.bindPopup(popupHtml(v), { maxWidth: 320 });
        markersByMmsi[v.mmsi] = { marker, latlng: [v.lat, v.lon] };
      });
    }

    function focusVessel(mmsi) {
      const entry = markersByMmsi[mmsi];
      if (!entry) return;
      map.flyTo(entry.latlng, 12, { duration: 0.6 });
      entry.marker.openPopup();
    }

    // ----------------------------------------------------------------- //
    // Sidebar / Target-Cards
    // ----------------------------------------------------------------- //
    function renderTargets(targets) {
      const container = document.getElementById("targets");
      container.innerHTML = "";
      if (!targets.length) {
        container.innerHTML =
          '<p style="color:var(--muted);padding:8px">Keine auffaelligen Ziele.</p>';
        return;
      }
      targets.forEach((v) => {
        const card = document.createElement("div");
        card.className = "card";
        card.onclick = () => focusVessel(v.mmsi);

        const badges = (v.reasons || [])
          .map(
            (r) =>
              `<span class="rule-badge">${r.label} <b>+${r.points}</b></span>`
          )
          .join("");

        const reasonText = v.top_reason
          ? v.top_reason.detail
          : "Keine Begruendung.";

        card.innerHTML = `
          <div class="card-head">
            <div>
              <div class="card-name">${v.name}</div>
              <div class="card-flag">MMSI ${v.mmsi} &middot; ${v.flag}</div>
            </div>
            <div class="badge-score" style="background:${colorFor(v.score)}">
              ${Math.round(v.score)}
            </div>
          </div>
          <p class="card-reason">${reasonText}</p>
          <div class="rule-badges">${badges}</div>
        `;
        container.appendChild(card);
      });
    }

    // ----------------------------------------------------------------- //
    // Laden
    // ----------------------------------------------------------------- //
    function showError(msg) {
      const status = document.getElementById("status");
      status.className = "error";
      status.innerHTML = msg;
    }

    async function load() {
      const status = document.getElementById("status");
      try {
        const [vesselsRes, targetsRes] = await Promise.all([
          fetch(`${API_BASE}/api/vessels`),
          fetch(`${API_BASE}/api/targets`),
        ]);
        if (!vesselsRes.ok || !targetsRes.ok) {
          throw new Error(`HTTP ${vesselsRes.status}/${targetsRes.status}`);
        }
        const vesselsData = await vesselsRes.json();
        const targetsData = await targetsRes.json();

        renderMarkers(vesselsData.vessels);
        renderTargets(targetsData.targets);

        status.className = "";
        status.textContent =
          `${vesselsData.count} Schiffe geladen · ` +
          `${targetsData.count} priorisierte Ziele`;
      } catch (err) {
        showError(
          `<b>Backend nicht erreichbar.</b><br>` +
            `Erwartet unter <code>${API_BASE}</code>.<br>` +
            `Starte es mit:<br><code>cd backend &amp;&amp; uvicorn app.main:app --reload</code><br>` +
            `<span style="opacity:0.7">(${err.message})</span>`
        );
      }
    }

    load();
  </script>
</body>
</html>
