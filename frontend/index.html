<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Mission Radar</title>

  <!-- Google Fonts: Space Grotesk (Headings) + Inter (Body/Mono) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
    rel="stylesheet" />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <!-- Leaflet.heat (fuer kommende Hotspot-Heatmap; hier bereits via CDN geladen) -->
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

  <style>
    /* ======================================================================
       FARBPALETTE & TOKENS — alle Farben als CSS-Variablen, keine Hex im Body
       ====================================================================== */
    :root {
      --bg: #080f17;
      --panel: #0d1b2a;
      --surface: #112233;
      --border: #1e3a5f;
      --txt: #e2eaf3;
      --muted: #6b8caa;
      --accent: #00d4ff;
      --hi: #ff4d6d;
      --mid: #ffaa00;
      --lo: #00e676;
      --glow-hi: rgba(255, 77, 109, 0.15);
      --glow-accent: rgba(0, 212, 255, 0.10);

      /* abgeleitete Tokens (ebenfalls als Variablen, kein hartkodiertes Hex) */
      --glow-mid: rgba(255, 170, 0, 0.13);
      --glow-lo: rgba(0, 230, 118, 0.13);
      --surface-hi: #18324a;
      --shadow: rgba(0, 0, 0, 0.45);
      --scrollthumb: rgba(0, 212, 255, 0.35);
      --skeleton-1: #112233;
      --skeleton-2: #16314a;
      --pill-live: rgba(0, 230, 118, 0.12);
      --pill-syn: rgba(255, 170, 0, 0.12);

      --sidebar-w: 380px;
      --topbar-h: 56px;
      --t: 170ms ease;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--txt);
      font-family: "Inter", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Scrollbar (thin, dark, accent thumb) */
    *::-webkit-scrollbar { width: 8px; height: 8px; }
    *::-webkit-scrollbar-track { background: var(--panel); }
    *::-webkit-scrollbar-thumb { background: var(--scrollthumb); border-radius: 4px; }
    *::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    * { scrollbar-width: thin; scrollbar-color: var(--scrollthumb) var(--panel); }

    /* ======================================================================
       LAYOUT
       ====================================================================== */
    #app {
      display: grid;
      grid-template-rows: var(--topbar-h) 1fr;
      grid-template-columns: var(--sidebar-w) 1fr;
      grid-template-areas: "topbar topbar" "sidebar map";
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    /* ---------------- TOPBAR ---------------- */
    #topbar {
      grid-area: topbar;
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 0 18px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 0 var(--glow-accent), 0 4px 18px var(--shadow);
      z-index: 1200;
    }
    .brand {
      font-family: "Space Grotesk", sans-serif;
      font-weight: 700;
      font-size: 17px;
      letter-spacing: 1.5px;
      color: var(--accent);
      white-space: nowrap;
      text-shadow: 0 0 14px var(--glow-accent);
    }
    .brand span { opacity: 0.85; }
    .topbar-spacer { flex: 1; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      padding: 5px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
      text-transform: uppercase;
    }
    .pill .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--muted);
    }
    .pill.live { color: var(--lo); border-color: var(--lo); background: var(--pill-live); }
    .pill.live .dot { background: var(--lo); animation: blink 1.4s ease-in-out infinite; }
    .pill.syn { color: var(--mid); border-color: var(--mid); background: var(--pill-syn); }
    .pill.syn .dot { background: var(--mid); }

    .topbar-meta {
      display: flex; flex-direction: column; align-items: flex-end;
      line-height: 1.25;
    }
    .topbar-meta .count {
      font-size: 13px; font-weight: 600; color: var(--txt);
    }
    .topbar-meta .count b { color: var(--accent); }
    .topbar-meta .ts { font-size: 10.5px; color: var(--muted); }

    /* ---------------- SIDEBAR ---------------- */
    #sidebar {
      grid-area: sidebar;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-head {
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-head h2 {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2.5px;
      color: var(--muted);
      text-transform: uppercase;
    }
    .sidebar-head .sub { margin-top: 4px; font-size: 11px; color: var(--muted); opacity: 0.8; }
    #cards { overflow-y: auto; padding: 12px; flex: 1; }

    /* ---------------- TARGET CARD ---------------- */
    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--muted);
      border-radius: 10px;
      padding: 11px 13px 12px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: background var(--t), border-color var(--t), transform var(--t),
                  box-shadow var(--t);
    }
    .card.hi  { border-left-color: var(--hi); }
    .card.mid { border-left-color: var(--mid); }
    .card.lo  { border-left-color: var(--lo); }
    .card:hover { background: var(--surface-hi); transform: translateX(2px); }
    .card.hi:hover  { box-shadow: -3px 0 14px var(--glow-hi); }
    .card.mid:hover { box-shadow: -3px 0 14px var(--glow-mid); }
    .card.lo:hover  { box-shadow: -3px 0 14px var(--glow-lo); }

    .card-row1 { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .card-name {
      font-weight: 600; font-size: 14px; color: var(--txt);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-row2 {
      margin-top: 6px; font-size: 11.5px; color: var(--muted);
      display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
    }
    .card-row2 .sep { opacity: 0.4; }
    .card-row2 .reason { color: var(--txt); opacity: 0.85; }
    .rule-badges { margin-top: 9px; display: flex; flex-wrap: wrap; gap: 5px; }
    .rule-badge {
      font-size: 10px; font-weight: 500;
      padding: 2px 7px; border-radius: 5px;
      background: var(--panel); border: 1px solid var(--border); color: var(--muted);
      white-space: nowrap;
    }

    /* ---------------- SCORE BADGES ---------------- */
    .badge {
      font-family: "Space Grotesk", sans-serif;
      font-weight: 700; font-size: 13px;
      padding: 3px 11px; border-radius: 999px;
      min-width: 46px; text-align: center; flex: none;
    }
    .badge-hi  { background: var(--glow-hi);  color: var(--hi);  border: 1px solid var(--hi);  box-shadow: 0 0 12px var(--glow-hi); }
    .badge-mid { background: var(--glow-mid); color: var(--mid); border: 1px solid var(--mid); box-shadow: 0 0 12px var(--glow-mid); }
    .badge-lo  { background: var(--glow-lo);  color: var(--lo);  border: 1px solid var(--lo);  box-shadow: 0 0 10px var(--glow-lo); }

    /* ---------------- SKELETON LOADER ---------------- */
    .skeleton {
      height: 78px; border-radius: 10px; margin-bottom: 10px;
      border: 1px solid var(--border); border-left: 3px solid var(--border);
      background: linear-gradient(100deg, var(--skeleton-1) 30%, var(--skeleton-2) 50%, var(--skeleton-1) 70%);
      background-size: 200% 100%;
      animation: shimmer 1.3s linear infinite;
    }

    /* ---------------- MAP ---------------- */
    #map { grid-area: map; height: 100%; width: 100%; background: var(--bg); z-index: 1; }

    .map-overlay {
      position: absolute; inset: 0; z-index: 500;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 14px;
      background: var(--bg); color: var(--muted);
      font-size: 13px; letter-spacing: 1px; pointer-events: none;
      transition: opacity 300ms ease;
    }
    .map-overlay .spinner {
      width: 34px; height: 34px; border-radius: 50%;
      border: 3px solid var(--border); border-top-color: var(--accent);
      animation: spin 0.9s linear infinite;
    }
    .map-overlay.hidden { opacity: 0; }

    /* Error banner */
    #error-banner {
      position: absolute; top: calc(var(--topbar-h) + 10px); left: 50%;
      transform: translateX(-50%); z-index: 1500;
      background: var(--glow-hi); border: 1px solid var(--hi); color: var(--hi);
      padding: 9px 16px; border-radius: 8px; font-size: 12.5px;
      box-shadow: 0 6px 22px var(--shadow); display: none; max-width: 90vw;
    }
    #error-banner code {
      font-family: "Inter", monospace; color: var(--txt);
      background: var(--panel); padding: 1px 6px; border-radius: 4px;
    }

    /* ---------------- VESSEL MARKERS (divIcon) ---------------- */
    .vmarker { position: relative; display: flex; align-items: center; justify-content: center; }
    .vmarker .vdot {
      width: 100%; height: 100%; border-radius: 50%;
      background: currentColor; box-shadow: 0 0 9px currentColor;
      border: 1px solid var(--bg);
    }
    .vmarker.hi  { color: var(--hi); }
    .vmarker.mid { color: var(--mid); }
    .vmarker.lo  { color: var(--lo); }
    /* Pulsierender Ring nur fuer Score > 70 */
    .vmarker.pulse::before {
      content: ""; position: absolute; inset: -7px; border-radius: 50%;
      border: 2px solid currentColor; animation: ring 1.7s ease-out infinite;
    }

    /* ---------------- DARK POPUP ---------------- */
    .leaflet-popup-content-wrapper, .leaflet-popup-tip {
      background: var(--surface); color: var(--txt);
      border: 1px solid var(--border); box-shadow: 0 8px 28px var(--shadow);
    }
    .leaflet-popup-content-wrapper { border-radius: 10px; }
    .leaflet-popup-content { margin: 13px 15px; font-size: 12.5px; line-height: 1.5; }
    .pop-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .pop-name { font-family: "Space Grotesk", sans-serif; font-weight: 600; font-size: 15px; }
    .pop-mmsi { font-family: "Inter", monospace; font-size: 11px; color: var(--muted); margin-top: 3px; letter-spacing: 0.5px; }
    .pop-reasons { margin: 10px 0 0; padding: 0; list-style: none; }
    .pop-reasons li { margin-bottom: 8px; padding-left: 10px; border-left: 2px solid var(--border); }
    .pop-reasons .lbl { font-weight: 600; }
    .pop-reasons.hi .lbl  { color: var(--hi); }
    .pop-reasons.mid .lbl { color: var(--mid); }
    .pop-reasons.lo .lbl  { color: var(--lo); }
    .pop-reasons .det { color: var(--muted); font-size: 11.5px; }
    a.leaflet-popup-close-button { color: var(--muted) !important; }
    .leaflet-control-attribution {
      background: var(--panel) !important; color: var(--muted) !important;
      font-size: 10px !important; border: none !important;
    }
    .leaflet-control-attribution a { color: var(--accent) !important; }

    /* fade-in for cards */
    .fade-in { animation: fade 0.4s ease both; }

    /* ======================================================================
       ANIMATIONS
       ====================================================================== */
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes shimmer { to { background-position: -200% 0; } }
    @keyframes ring {
      0% { transform: scale(0.7); opacity: 0.9; }
      100% { transform: scale(1.8); opacity: 0; }
    }
    @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    /* ======================================================================
       MOBILE (<768px): Karte oben, Sidebar darunter
       ====================================================================== */
    @media (max-width: 768px) {
      #app {
        grid-template-rows: var(--topbar-h) 55vh 1fr;
        grid-template-columns: 1fr;
        grid-template-areas: "topbar" "map" "sidebar";
      }
      #sidebar { border-right: none; border-top: 1px solid var(--border); }
      .topbar-meta { display: none; }
      .brand { font-size: 15px; letter-spacing: 1px; }
      .card { padding: 10px 11px; }
      #cards { padding: 10px; }
    }
  </style>
</head>

<body>
  <div id="app">
    <!-- TOPBAR -->
    <header id="topbar">
      <div class="brand">🛡 MISSION <span>RADAR</span></div>
      <div id="status-pill" class="pill"><span class="dot"></span><span id="status-text">CONNECTING</span></div>
      <div class="topbar-spacer"></div>
      <div class="topbar-meta">
        <div class="count"><b id="vessel-count">—</b> vessels monitored</div>
        <div class="ts" id="timestamp">—</div>
      </div>
    </header>

    <!-- SIDEBAR -->
    <aside id="sidebar">
      <div class="sidebar-head">
        <h2>Top Targets</h2>
        <div class="sub" id="sidebar-sub">Sorted by risk score · loading…</div>
      </div>
      <div id="cards"></div>
    </aside>

    <!-- MAP -->
    <div id="map"></div>
  </div>

  <div id="error-banner"></div>

  <script>
    // ====================================================================
    // KONFIGURATION
    // ====================================================================
    const API_BASE = "http://localhost:8000";
    const REFRESH_MS = 60000;          // Auto-Refresh der Daten
    const TS_TICK_MS = 15000;          // relativer Timestamp-Tick

    // CSS-Variablen als einzige Farbquelle (auch fuer JS lesbar)
    const css = (name) => getComputedStyle(document.documentElement).getPropertyValue(name).trim();

    // ====================================================================
    // HELFER
    // ====================================================================
    const ISO3to2 = {
      ECU:'EC',CHN:'CN',PAN:'PA',USA:'US',POL:'PL',FRA:'FR',GBR:'GB',VEN:'VE',
      NGA:'NG',GNQ:'GQ',TGO:'TG',ESP:'ES',KOR:'KR',TWN:'TW',JPN:'JP',RUS:'RU',
      PRT:'PT',ITA:'IT',MEX:'MX',PER:'PE',CHL:'CL',COL:'CO',IDN:'ID',VNM:'VN',
      BLZ:'BZ',COM:'KM',STP:'ST',LBR:'LR',MHL:'MH',HKG:'HK',ATG:'AG'
    };
    function flagEmoji(iso3) {
      const c = ISO3to2[(iso3 || '').toUpperCase()];
      if (!c) return '🏴';
      return c.replace(/./g, ch => String.fromCodePoint(127397 + ch.charCodeAt(0)));
    }
    function riskClass(score) { return score > 60 ? 'hi' : (score >= 30 ? 'mid' : 'lo'); }

    let lastUpdate = null;
    function relativeTime() {
      if (!lastUpdate) return '—';
      const s = Math.round((Date.now() - lastUpdate) / 1000);
      if (s < 5) return 'Updated just now';
      if (s < 60) return `Updated ${s}s ago`;
      const m = Math.floor(s / 60);
      return `Updated ${m} min ago`;
    }
    function tickTimestamp() { document.getElementById('timestamp').textContent = relativeTime(); }

    // ====================================================================
    // KARTE
    // ====================================================================
    const map = L.map('map', { zoomControl: true, attributionControl: true })
      .setView([-0.5, -90.5], 8);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap &copy; CARTO',
      maxZoom: 19
    }).addTo(map);

    const markersByMmsi = {};
    let markerLayer = L.layerGroup().addTo(map);

    function vesselMarker(v) {
      const cls = riskClass(v.score);
      const d = Math.round(2 * (6 + v.score / 15));      // Durchmesser = 2*(6 + score/15)
      const pulse = v.score > 70 ? ' pulse' : '';
      const icon = L.divIcon({
        className: '',
        html: `<div class="vmarker ${cls}${pulse}" style="width:${d}px;height:${d}px"><span class="vdot"></span></div>`,
        iconSize: [d, d], iconAnchor: [d / 2, d / 2]
      });
      const m = L.marker([v.lat, v.lon], { icon });
      m.bindPopup(popupHtml(v), { maxWidth: 320, className: 'mr-popup' });
      return m;
    }

    function popupHtml(v) {
      const cls = riskClass(v.score);
      const reasons = (v.reasons || []).map(r =>
        `<li><span class="lbl">${r.label} +${r.points}</span><br><span class="det">${r.detail || ''}</span></li>`
      ).join('');
      return `
        <div class="pop-head">
          <span class="pop-name">${v.name}</span>
          <span class="badge badge-${cls}">${v.score.toFixed(1)}</span>
        </div>
        <div class="pop-mmsi">MMSI: ${v.mmsi}</div>
        <div class="pop-mmsi">${flagEmoji(v.flag)} ${v.flag} · ${v.speed_knots.toFixed(1)} kn</div>
        ${reasons ? `<ul class="pop-reasons ${cls}">${reasons}</ul>`
                  : `<div class="det" style="margin-top:8px;color:var(--muted)">No risk reasons.</div>`}
      `;
    }

    function focusVessel(mmsi) {
      const e = markersByMmsi[mmsi];
      if (!e) return;
      map.flyTo(e.latlng, 11, { duration: 0.6 });
      e.marker.openPopup();
    }

    // ====================================================================
    // SIDEBAR RENDERING
    // ====================================================================
    function showSkeletons() {
      const c = document.getElementById('cards');
      c.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>';
    }

    function renderCards(vessels) {
      const c = document.getElementById('cards');
      c.innerHTML = '';
      const sorted = [...vessels].sort((a, b) => b.score - a.score);
      if (!sorted.length) {
        c.innerHTML = '<div class="sub" style="padding:8px;color:var(--muted)">No vessels in current window.</div>';
        return;
      }
      sorted.forEach((v, i) => {
        const cls = riskClass(v.score);
        const badges = (v.reasons || []).map(r => `<span class="rule-badge">${r.label}</span>`).join('');
        const reason = v.top_reason ? v.top_reason.label : '—';
        const card = document.createElement('div');
        card.className = `card ${cls} fade-in`;
        card.style.animationDelay = `${Math.min(i * 35, 350)}ms`;
        card.onclick = () => focusVessel(v.mmsi);
        card.innerHTML = `
          <div class="card-row1">
            <span class="card-name">${v.name}</span>
            <span class="badge badge-${cls}">${v.score.toFixed(1)}</span>
          </div>
          <div class="card-row2">
            <span>${flagEmoji(v.flag)} ${v.flag}</span><span class="sep">|</span>
            <span>${v.speed_knots.toFixed(1)} kn</span><span class="sep">|</span>
            <span class="reason">${reason}</span>
          </div>
          ${badges ? `<div class="rule-badges">${badges}</div>` : ''}
        `;
        c.appendChild(card);
      });
    }

    // ====================================================================
    // STATUS / FEHLER
    // ====================================================================
    function setStatus(source) {
      const pill = document.getElementById('status-pill');
      const text = document.getElementById('status-text');
      if (source === 'gfw') { pill.className = 'pill live'; text.textContent = 'LIVE'; }
      else { pill.className = 'pill syn'; text.textContent = 'SYNTHETIC DATA'; }
    }
    function showError(msg) {
      const b = document.getElementById('error-banner');
      b.innerHTML = msg; b.style.display = 'block';
    }
    function hideError() { document.getElementById('error-banner').style.display = 'none'; }
    function setOverlay(show, text) {
      const o = document.getElementById('map-overlay');
      if (!o) return;
      o.classList.toggle('hidden', !show);
      if (text) o.querySelector('.ov-text').textContent = text;
    }

    // ====================================================================
    // LADEN
    // ====================================================================
    async function loadData() {
      try {
        // Health -> Datenquelle fuer Status-Pill (GET / liefert default_data_source)
        const health = await fetch(`${API_BASE}/`).then(r => r.ok ? r.json() : null).catch(() => null);
        if (health) setStatus(health.default_data_source);

        const [vRes, tRes] = await Promise.all([
          fetch(`${API_BASE}/api/vessels`),
          fetch(`${API_BASE}/api/targets`)
        ]);
        if (!vRes.ok || !tRes.ok) throw new Error(`HTTP ${vRes.status}/${tRes.status}`);
        const vData = await vRes.json();
        const tData = await tRes.json();
        if (!health) setStatus(vData.source);

        // Marker
        markerLayer.clearLayers();
        Object.keys(markersByMmsi).forEach(k => delete markersByMmsi[k]);
        vData.vessels.forEach(v => {
          const m = vesselMarker(v);
          m.addTo(markerLayer);
          markersByMmsi[v.mmsi] = { marker: m, latlng: [v.lat, v.lon] };
        });

        // Sidebar: Targets bevorzugt (gerankt), sonst alle Schiffe
        renderCards(tData.targets && tData.targets.length ? tData.targets : vData.vessels);

        // Topbar-Meta
        document.getElementById('vessel-count').textContent = vData.count;
        lastUpdate = Date.now();
        tickTimestamp();
        document.getElementById('sidebar-sub').textContent =
          `Sorted by risk score · ${relativeTime().toLowerCase()}`;

        hideError();
        setOverlay(false);
      } catch (err) {
        setOverlay(true, 'Data source unreachable');
        showError(
          `<b>Backend offline.</b> Run: <code>uvicorn app.main:app --reload</code> ` +
          `<span style="opacity:.6">(${err.message})</span>`
        );
      }
    }

    // ====================================================================
    // INIT
    // ====================================================================
    (function init() {
      // Map-Overlay (Loading) einsetzen
      const ov = document.createElement('div');
      ov.id = 'map-overlay'; ov.className = 'map-overlay';
      ov.innerHTML = '<div class="spinner"></div><div class="ov-text">Connecting to data source…</div>';
      document.getElementById('map').appendChild(ov);

      showSkeletons();
      loadData();
      setInterval(loadData, REFRESH_MS);
      setInterval(() => {
        tickTimestamp();
        document.getElementById('sidebar-sub').textContent =
          `Sorted by risk score · ${relativeTime().toLowerCase()}`;
      }, TS_TICK_MS);
    })();
  </script>
