version: "3.9"

# VesselX - All-Source Maritime C4ISR System
# Independent services coordinate through Redis queues/PubSub and PostGIS.

x-common-env: &common-env
  APP_NAME: "VesselX"
  DATABASE_URL: "postgresql+asyncpg://vesselx:vesselx@vesselx-core-db:5432/vesselx"
  SYNC_DATABASE_URL: "postgresql+psycopg2://vesselx:vesselx@vesselx-core-db:5432/vesselx"
  SHIPBOARD_DATABASE_URL: "postgresql+asyncpg://vesselx:vesselx@vesselx-shipboard-store:5432/vesselx_shipboard"
  SYNC_SHIPBOARD_DATABASE_URL: "postgresql+psycopg2://vesselx:vesselx@vesselx-shipboard-store:5432/vesselx_shipboard"
  REDIS_URL: "redis://vesselx-telemetry-cache:6379/0"
  CELERY_BROKER_URL: "redis://vesselx-telemetry-cache:6379/1"
  CELERY_RESULT_BACKEND: "redis://vesselx-telemetry-cache:6379/2"
  LOG_LEVEL: "INFO"
  PYTHONPATH: "/app/src:/app"

x-vesselx-base: &vesselx-base
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    <<: *common-env
  env_file:
    - .env
  restart: unless-stopped
  depends_on:
    vesselx-core-db:
      condition: service_healthy
    vesselx-telemetry-cache:
      condition: service_healthy
  networks:
    - vesselx_net

services:
  vesselx-core-db:
    image: kartoza/postgis:16-3.4
    container_name: vesselx-core-db
    environment:
      POSTGRES_USER: vesselx
      POSTGRES_PASSWORD: vesselx
      POSTGRES_DB: vesselx
    volumes:
      - vesselx_pgdata:/var/lib/postgresql/data
      - ./src/spyhop/db/migrations/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vesselx -d vesselx"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - vesselx_net

  vesselx-shipboard-store:
    image: kartoza/postgis:16-3.4
    container_name: vesselx-shipboard-store
    environment:
      POSTGRES_USER: vesselx
      POSTGRES_PASSWORD: vesselx
      POSTGRES_DB: vesselx_shipboard
    volumes:
      - vesselx_shipboard_pgdata:/var/lib/postgresql/data
      - ./src/spyhop/db/migrations/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vesselx -d vesselx_shipboard"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    profiles:
      - shipboard
    networks:
      - vesselx_net

  vesselx-telemetry-cache:
    image: redis:7-alpine
    container_name: vesselx-telemetry-cache
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - vesselx_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - vesselx_net

  vesselx-gateway:
    <<: *vesselx-base
    container_name: vesselx-gateway
    command: python -m vesselx.gateway.runner
    depends_on:
      vesselx-telemetry-cache:
        condition: service_healthy
      vesselx-shipboard-store:
        condition: service_healthy
        required: false
    profiles:
      - live
      - shipboard

  vesselx-gateway-api:
    <<: *vesselx-base
    container_name: vesselx-gateway-api
    command: >
      uvicorn vesselx.gateway.app:app
      --host 0.0.0.0
      --port 8010
      --log-level info
    ports:
      - "8010:8010"
    profiles:
      - live
      - shipboard

  vesselx-spatial-worker:
    <<: *vesselx-base
    container_name: vesselx-spatial-worker
    command: python -m vesselx.spatial_worker.worker

  vesselx-spatial-engine:
    <<: *vesselx-base
    container_name: vesselx-spatial-engine
    command: >
      uvicorn vesselx.spatial_engine.app:app
      --host 0.0.0.0
      --port 8000
      --workers 4
      --loop uvloop
      --http httptools
      --log-level info
    ports:
      - "8000:8000"

  vesselx-brain:
    <<: *vesselx-base
    container_name: vesselx-brain
    command: >
      celery -A spyhop.worker.celery_app worker
      --loglevel=info
      --concurrency=4
      --queues=default,scoring,sync

  vesselx-sync-worker:
    <<: *vesselx-base
    container_name: vesselx-sync-worker
    command: >
      celery -A spyhop.worker.celery_app beat
      --loglevel=info
      --scheduler celery.beat.PersistentScheduler
      --schedule /tmp/celerybeat-schedule

  vesselx-analytics-engine:
    <<: *vesselx-base
    container_name: vesselx-analytics-engine
    command: >
      uvicorn vesselx.analytics_engine.app:app
      --host 0.0.0.0
      --port 8001
      --workers 2
      --loop uvloop
      --http httptools
      --log-level info
    ports:
      - "8001:8001"

  vesselx-brain-api:
    <<: *vesselx-base
    container_name: vesselx-brain-api
    command: >
      uvicorn vesselx.brain.app:app
      --host 0.0.0.0
      --port 8020
      --log-level info
    ports:
      - "8020:8020"
    profiles:
      - ops

  vesselx-desktop-client:
    image: node:20-alpine
    container_name: vesselx-desktop-client
    working_dir: /app
    environment:
      VITE_API_URL: "http://localhost:8000"
    volumes:
      - ./frontend-vite:/app
      - vesselx_desktop_node_modules:/app/node_modules
      - vesselx_vector_tiles:/offline/vector-tiles
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      - vesselx-spatial-engine
    profiles:
      - client
      - shipboard
    networks:
      - vesselx_net

  vesselx-ops-flower:
    <<: *vesselx-base
    container_name: vesselx-ops-flower
    command: >
      celery -A spyhop.worker.celery_app flower
      --port=5555
      --url_prefix=flower
    ports:
      - "5555:5555"
    depends_on:
      vesselx-telemetry-cache:
        condition: service_healthy
    profiles:
      - ops

volumes:
  vesselx_pgdata:
  vesselx_shipboard_pgdata:
  vesselx_redisdata:
  vesselx_desktop_node_modules:
  vesselx_vector_tiles:

networks:
  vesselx_net:
    driver: bridge
