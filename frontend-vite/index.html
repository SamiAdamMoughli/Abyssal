<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>SPYHOP · Mission Radar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="app">
    <header id="topbar">
      <div class="logo"><span class="skull">☠</span>SPYHOP</div>
      <div class="subtitle">MISSION RADAR</div>
      <div class="topbar-spacer"></div>
      <div id="status-pill" class="pill syn"><span class="dot"></span><span id="status-text">CONNECTING</span></div>
      <button id="auth-btn" class="auth-btn" title="Authenticate as operator">⚿ LOGIN</button>
      <div class="toggle-group">
        <button class="toggle-btn" data-mode="vessels">🚢 VESSELS</button>
        <button class="toggle-btn" data-mode="mpas">🛡 MPAs</button>
        <button class="toggle-btn active" data-mode="both">⊕ BOTH</button>
      </div>
      <select id="base-layer-select" class="base-layer-select" aria-label="Base map layer">
        <option value="dark">🌑 DARK MATTER</option>
        <option value="satellite">🛰 SATELLITE</option>
        <option value="bathymetric">🌊 BATHYMETRIC</option>
        <option value="terrain">⛰ TERRAIN</option>
        <option value="osm">🗺 STREET MAP</option>
        <option value="noaa">⚓ NOAA NAUTICAL</option>
      </select>
      <div class="count"><b id="vessel-count">—</b> vessels<span id="mpa-count"></span></div>
      <!-- Alert toggle -->
      <button id="alert-toggle-btn" class="alert-toggle-btn" aria-label="Toggle alert panel">
        ⚡ ALERTS
        <span id="alert-badge" class="alert-badge" style="display:none"></span>
      </button>
    </header>

    <aside id="sidebar">
      <div class="sidebar-head">
        <h2>VESSEL LIST</h2>
        <div class="sub" id="sidebar-sub">Search and sort all vessels</div>
        <div class="daterow">
          <div class="datefield"><label>FROM</label><input type="date" id="date-from" /></div>
          <div class="datefield"><label>TO</label><input type="date" id="date-to" /></div>
        </div>
        <div class="sidebar-controls">
          <input id="search-input" type="search" placeholder="Search name, MMSI, flag…" />
          <select id="sort-select" aria-label="Sort vessels">
            <option value="score_desc">Score ↓</option>
            <option value="score_asc">Score ↑</option>
            <option value="name_asc">Name A→Z</option>
            <option value="name_desc">Name Z→A</option>
            <option value="flag_asc">Flag A→Z</option>
            <option value="mpa_first">In MPA first</option>
          </select>
        </div>
        <div class="cat-filters" id="cat-filters">
          <button class="cat-btn active" data-cat="all">ALL</button>
          <button class="cat-btn" data-cat="commercial">
            <svg width="14" height="8" viewBox="0 0 14 8" aria-hidden="true"><rect x=".5" y=".5" width="13" height="7" rx="1" fill="currentColor"/></svg>COMMERCIAL
          </button>
          <button class="cat-btn" data-cat="fishing">
            <svg width="10" height="10" viewBox="0 0 10 10" aria-hidden="true"><polygon points="5,0.5 9.5,5 5,9.5 0.5,5" fill="currentColor"/></svg>FISHING
          </button>
          <button class="cat-btn" data-cat="enforcement">
            <svg width="10" height="10" viewBox="0 0 10 10" aria-hidden="true"><polygon points="5,0.5 9.5,9.5 0.5,9.5" fill="currentColor"/></svg>ENFORCEMENT
          </button>
          <button class="cat-btn" data-cat="support">
            <svg width="14" height="8" viewBox="0 0 14 8" aria-hidden="true"><rect x=".5" y=".5" width="13" height="7" rx="3.5" fill="currentColor"/></svg>SUPPORT
          </button>
        </div>
      </div>
      <div id="cards"></div>
    </aside>

    <div id="map"></div>
  </div>

  <button id="search-btn">🔍 SEARCH THIS AREA</button>
  <button id="hex-mode-btn">⬡ HEX GRID</button>
  <button id="hex-search-btn" disabled style="display:none">⬡ SEARCH SELECTED — <span id="hex-selection-count"></span></button>
  <div id="area-warn">⚠ LARGE AREA — results may be slow or limited. Zoom in for best results.</div>
  <!-- VESSEL DETAIL PANEL -->
  <div id="detail-panel">
    <div id="detail-content"></div>
  </div>

  <!-- ALERT SIDEBAR -->
  <div id="alert-panel" class="alert-panel" hidden>
    <div class="alert-panel-head">
      <h2>⚡ LIVE ALERTS</h2>
      <button id="alert-panel-close" class="alert-panel-close" aria-label="Close alert panel">✕</button>
    </div>
    <div id="alert-list" class="alert-list">
      <div class="alert-empty">No alerts — all clear.</div>
    </div>
  </div>

  <!-- STATS BAR -->
  <div id="stats-bar" class="stats-bar"></div>

  <!-- OVERLAY CONTROLS -->
  <div id="overlay-panel" class="overlay-panel">
    <div class="overlay-title">OVERLAYS</div>
    <label class="overlay-row">
      <input type="checkbox" id="overlay-heatmap" />
      <span>🔥 Vessel density heatmap</span>
    </label>
    <label class="overlay-row">
      <input type="checkbox" id="overlay-weather" />
      <span>🌬 Wind overlay</span>
    </label>
  </div>

  <div id="error-banner"></div>
  <div id="mpa-loading">◈ Loading protected areas…</div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
